spring:
  application:
    name: tradelab-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tradelab}
    username: ${DB_USERNAME:tradelab_user}
    password: ${DB_PASSWORD:tradelab_local_password}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always